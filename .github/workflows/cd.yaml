name: CD

on:
  release:
    types:
      - released
      - prereleased

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-upload-cli-artifact:
    strategy:
      matrix:
        include:
          - arch: amd64
            os: linux
            channel: cn
            base_api_endpoint: https://openapi.coscene.cn
            download_base_url: https://download.coscene.cn/
          - arch: amd64
            os: darwin
            channel: cn
            base_api_endpoint: https://openapi.coscene.cn
            download_base_url: https://download.coscene.cn/
          - arch: arm64
            os: linux
            channel: cn
            base_api_endpoint: https://openapi.coscene.cn
            download_base_url: https://download.coscene.cn/
          - arch: arm64
            os: darwin
            channel: cn
            base_api_endpoint: https://openapi.coscene.cn
            download_base_url: https://download.coscene.cn/
          - arch: amd64
            os: linux
            channel: io
            base_api_endpoint: https://openapi.coscene.io
            download_base_url: https://download.coscene.io/
          - arch: amd64
            os: darwin
            channel: io
            base_api_endpoint: https://openapi.coscene.io
            download_base_url: https://download.coscene.io/
          - arch: arm64
            os: linux
            channel: io
            base_api_endpoint: https://openapi.coscene.io
            download_base_url: https://download.coscene.io/
          - arch: arm64
            os: darwin
            channel: io
            base_api_endpoint: https://openapi.coscene.io
            download_base_url: https://download.coscene.io/
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Check version
      - name: Check if version is semantic
        run: echo "${{ github.ref_name }}" | grep -q -E '^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(-((0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(\.(0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(\+([0-9a-zA-Z-]+(\.[0-9a-zA-Z-]+)*))?$'
      - name: Check if version is release or beta
        run: |
          if echo "${{ github.ref_name }}" | grep -q -E '^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$'; then
            echo "IS_RELEASE=true" >> $GITHUB_ENV
          else
            echo "IS_RELEASE=false" >> $GITHUB_ENV
          fi
      
      # Build
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25
      - name: Build cocli
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} COCLI_BASE_API_ENDPOINT=${{ matrix.base_api_endpoint }} COCLI_DOWNLOAD_BASE_URL=${{ matrix.download_base_url }} make build-binary
          cp bin/cocli cocli
          cp bin/cocli ${{ matrix.channel == 'cn' && format('bin/cocli-{0}-{1}', matrix.os, matrix.arch) || format('bin/cocli-{0}-{1}-{2}', matrix.channel, matrix.os, matrix.arch) }}
      
      # Upload to GitHub release
      - name: Upload release artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload \
            "${{ github.ref_name }}" \
            "${{ matrix.channel == 'cn' && format('bin/cocli-{0}-{1}', matrix.os, matrix.arch) || format('bin/cocli-{0}-{1}-{2}', matrix.channel, matrix.os, matrix.arch) }}" \
            --clobber
  
      # Upload release payloads
      - name: Install release upload tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gzip unzip awscli
          if ! command -v ossutil >/dev/null 2>&1; then
            curl -fsSL https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash
          fi
      - name: Build release metadata files
        if: env.IS_RELEASE == 'true'
        run: |
          SHA256SUM=$(sha256sum cocli | awk '{print $1}' | xxd -r -p | base64) 
          echo "{\"Version\": \"${{ github.ref_name }}\", \"Sha256\": \"$SHA256SUM\"}" > ${{ matrix.os }}-${{ matrix.arch }}.json
      - name: gzip cocli
        run: gzip cocli
      - name: Render channel install script
        if: matrix.os == 'linux' && matrix.arch == 'amd64'
        run: |
          sed "s#^DOWNLOAD_BASE_URL_DEFAULT=.*#DOWNLOAD_BASE_URL_DEFAULT=\"${{ matrix.download_base_url }}\"#" scripts/install.sh > install.sh
          chmod +x install.sh
      - name: Configure ossutil
        if: matrix.channel == 'cn'
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          ossutil config \
            -e https://oss-cn-hangzhou.aliyuncs.com \
            -i "$OSS_ACCESS_KEY_ID" \
            -k "$OSS_ACCESS_KEY_SECRET" \
            -L EN \
            -c "$RUNNER_TEMP/.ossutilconfig"
      - name: Upload cocli to oss corresponding version
        if: matrix.channel == 'cn'
        run: |
          ossutil cp \
            cocli.gz \
            oss://coscene-download/cocli/${{ github.ref_name }}/${{ matrix.os }}-${{ matrix.arch }}.gz \
            --acl public-read \
            -c "$RUNNER_TEMP/.ossutilconfig"
      - name: Upload install script to oss
        if: matrix.channel == 'cn' && matrix.os == 'linux' && matrix.arch == 'amd64'
        run: |
          ossutil cp \
            install.sh \
            oss://coscene-download/cocli/install.sh \
            --acl public-read \
            -c "$RUNNER_TEMP/.ossutilconfig"
      - name: Upload cocli to oss latest
        if: matrix.channel == 'cn' && env.IS_RELEASE == 'true'
        run: |
          ossutil cp \
            cocli.gz \
            oss://coscene-download/cocli/latest/${{ matrix.os }}-${{ matrix.arch }}.gz \
            --acl public-read \
            -c "$RUNNER_TEMP/.ossutilconfig"
          ossutil cp \
            ${{ matrix.os }}-${{ matrix.arch }}.json \
            oss://coscene-download/cocli/${{ matrix.os }}-${{ matrix.arch }}.json \
            --acl public-read \
            -c "$RUNNER_TEMP/.ossutilconfig"
      - name: Prepare io version upload
        if: matrix.channel == 'io'
        run: |
          mkdir -p upload_version
          cp cocli.gz upload_version/${{ matrix.os }}-${{ matrix.arch }}.gz
      - name: Prepare io install script upload
        if: matrix.channel == 'io' && matrix.os == 'linux' && matrix.arch == 'amd64'
        run: |
          mkdir -p upload_install
          cp install.sh upload_install/install.sh
      - name: Upload cocli to s3 corresponding version
        if: matrix.channel == 'io'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ARTIFACTS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_ARTIFACTS_ACCESS_SECRET }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          aws s3 cp \
            upload_version \
            s3://coscene-download/cocli/${{ github.ref_name }}/ \
            --recursive \
            --acl public-read \
            --no-progress
      - name: Upload install script to s3
        if: matrix.channel == 'io' && matrix.os == 'linux' && matrix.arch == 'amd64'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ARTIFACTS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_ARTIFACTS_ACCESS_SECRET }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          aws s3 cp \
            upload_install \
            s3://coscene-download/cocli/ \
            --recursive \
            --acl public-read \
            --no-progress
      - name: Prepare io latest payloads
        if: matrix.channel == 'io' && env.IS_RELEASE == 'true'
        run: |
          mkdir -p upload_latest upload_metadata
          cp cocli.gz upload_latest/${{ matrix.os }}-${{ matrix.arch }}.gz
          cp ${{ matrix.os }}-${{ matrix.arch }}.json upload_metadata/${{ matrix.os }}-${{ matrix.arch }}.json
      - name: Upload cocli to s3 latest
        if: matrix.channel == 'io' && env.IS_RELEASE == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ARTIFACTS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_ARTIFACTS_ACCESS_SECRET }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          aws s3 cp \
            upload_latest \
            s3://coscene-download/cocli/latest/ \
            --recursive \
            --acl public-read \
            --no-progress
      - name: Upload cocli metadata to s3
        if: matrix.channel == 'io' && env.IS_RELEASE == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ARTIFACTS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_ARTIFACTS_ACCESS_SECRET }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          aws s3 cp \
            upload_metadata \
            s3://coscene-download/cocli/ \
            --recursive \
            --acl public-read \
            --no-progress
